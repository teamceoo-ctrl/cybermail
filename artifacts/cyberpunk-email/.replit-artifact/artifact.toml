kind = "web"
previewPath = "/"
title = "CyberMail — Email Campaign Platform"
version = "1.0.0"
id = "artifacts/cyberpunk-email"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20616

[services.development]
run = "pnpm --filter @workspace/cyberpunk-email run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cyberpunk-email", "run", "build" ]
publicDir = "artifacts/cyberpunk-email/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20616"
BASE_PATH = "/"
